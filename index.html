<style>
    /* EXACT GURU BACKGROUND - Jaisa picture mein hai */
    .guru-exact-bg {
        width: 100%;
        min-height: 500px;
        position: relative;
        background: #2b3247;
        overflow: hidden;
        display: flex;
        align-items: center;
        padding: 60px 40px;
    }

    /* Light blue gradient - right side (exactly like picture) */
    .guru-exact-bg::before {
        content: '';
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        width: 60%;
        background: linear-gradient(135deg, 
                    rgba(43, 50, 71, 0) 0%,
                    rgba(43, 50, 71, 0.3) 30%,
                    rgba(59, 130, 200, 0.25) 60%,
                    rgba(70, 150, 220, 0.35) 100%);
        pointer-events: none;
    }

    /* Decorative circle - top right */
    .guru-exact-bg .dot-1 {
        position: absolute;
        right: -50px;
        top: -100px;
        width: 500px;
        height: 500px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(80, 160, 240, 0.12), transparent 70%);
        pointer-events: none;
    }

    /* Decorative circle - bottom right */
    .guru-exact-bg .dot-2 {
        position: absolute;
        right: 10%;
        bottom: -100px;
        width: 350px;
        height: 350px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(60, 140, 220, 0.10), transparent 70%);
        pointer-events: none;
    }

    /* Small circle - middle right */
    .guru-exact-bg .dot-3 {
        position: absolute;
        right: 30%;
        top: 15%;
        width: 150px;
        height: 150px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(100, 180, 255, 0.08), transparent 70%);
        pointer-events: none;
    }

    /* Content */
    .guru-exact-bg .content {
        position: relative;
        z-index: 2;
        color: #ffffff;
        max-width: 600px;
    }

    .guru-exact-bg .content h1 {
        font-size: 48px;
        font-weight: 700;
        margin: 0 0 12px 0;
        line-height: 1.2;
        color: #ffffff;
    }

    .guru-exact-bg .content h1 span {
        color: #ffffff;
    }

    .guru-exact-bg .content p {
        font-size: 18px;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.85);
        margin-bottom: 0;
    }

    /* Responsive */
    @media (max-width: 768px) {
        .guru-exact-bg {
            padding: 40px 20px;
            min-height: 350px;
        }
        .guru-exact-bg .content h1 {
            font-size: 30px;
        }
        .guru-exact-bg .content p {
            font-size: 15px;
        }
        .guru-exact-bg::before {
            width: 100%;
            opacity: 0.6;
        }
    }
</style>
