<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Brand · Aura</title>
  <!-- Font & basic reset for clean demo -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: #faf9fc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    .o-container {
      max-width: 1280px;
      width: 100%;
      background: #ffffff;
      border-radius: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      padding: 2rem 2rem 3rem;
      transition: all 0.2s;
    }

    /* toast – hidden, kept for structure */
    .module_toast {
      display: none;
    }

    /* hero main */
    .c-hero__main {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 1.75rem;
      padding: 1.5rem 0.5rem 0.5rem;
    }

    /* headings */
    .c-hero__headings {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .c-hero__title {
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: #0b0b1a;
      margin-bottom: 0.25rem;
    }
    .c-hero__title span {
      background: linear-gradient(135deg, #a855f7, #6d28d9);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
    }

    /* heading 2 – hidden, but we keep structural */
    .c-hero__subTitle {
      display: none;
    }

    /* heading 3 – new large intro */
    .c-hero__copy {
      font-size: 1.4rem;
      font-weight: 400;
      line-height: 1.6;
      color: #1e1e2f;
      max-width: 780px;
      margin: 0 auto;
      background: #f5f0ff;
      padding: 1rem 2rem;
      border-radius: 60px;
      backdrop-filter: blur(2px);
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);
    }
    .c-hero__copy br {
      display: none; /* remove old line break */
    }
    .c-hero__copy strong {
      font-weight: 600;
      color: #6d28d9;
    }

    /* CTA area : form + extra button */
    .c-hero__cta {
      width: 100%;
      max-width: 780px;
      margin-top: 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    /* search form – modified placeholder + button */
    .c-hero__cta__form {
      width: 100%;
    }

    .c-searchGroup {
      display: flex;
      align-items: center;
      background: #ffffff;
      border: 1.5px solid #e2d9f0;
      border-radius: 100px;
      padding: 0.2rem 0.2rem 0.2rem 1.5rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 12px rgba(109, 40, 217, 0.06);
    }
    .c-searchGroup:focus-within {
      border-color: #7c3aed;
      box-shadow: 0 4px 16px rgba(109, 40, 217, 0.15);
    }

    .c-searchGroup__input {
      flex: 1;
      border: none;
      padding: 1rem 0.75rem 1rem 0.25rem;
      font-size: 1.2rem;
      font-weight: 450;
      background: transparent;
      color: #16162b;
      outline: none;
      font-family: 'Inter', sans-serif;
      letter-spacing: -0.01em;
    }
    .c-searchGroup__input::placeholder {
      color: #6b6b80;
      font-weight: 400;
      opacity: 0.8;
    }

    .c-searchGroup__button {
      background: #7c3aed;
      border: none;
      border-radius: 100px;
      padding: 0.8rem 1.8rem 0.8rem 1.6rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      font-weight: 600;
      font-size: 1.1rem;
      color: white;
      font-family: 'Inter', sans-serif;
      letter-spacing: -0.01em;
    }
    .c-searchGroup__button:hover {
      background: #6d28d9;
    }
    .c-searchGroup__button:active {
      transform: scale(0.96);
    }
    .c-searchGroup__button svg {
      display: none; /* hide old search icon */
    }
    /* new text inside button via pseudo? we use inner text directly in HTML */

    /* "see my work" button – secondary CTA */
    .c-hero__cta__secondary {
      background: transparent;
      border: 2px solid #d9c9f5;
      border-radius: 100px;
      padding: 0.85rem 2.4rem;
      font-size: 1.2rem;
      font-weight: 600;
      color: #3b1f6e;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(4px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
      letter-spacing: -0.01em;
    }
    .c-hero__cta__secondary:hover {
      background: #7c3aed;
      border-color: #7c3aed;
      color: white;
      box-shadow: 0 12px 24px -12px rgba(109, 40, 217, 0.3);
    }

    /* adjust for mobile */
    @media (max-width: 720px) {
      .o-container {
        padding: 1.5rem 1rem;
      }
      .c-hero__title {
        font-size: 2.8rem;
      }
      .c-hero__copy {
        font-size: 1.15rem;
        padding: 0.9rem 1.2rem;
        border-radius: 40px;
      }
      .c-searchGroup {
        padding-left: 1.2rem;
        flex-wrap: wrap;
        background: #ffffff;
        border-radius: 40px;
      }
      .c-searchGroup__input {
        font-size: 1rem;
        padding: 0.9rem 0.5rem;
        min-width: 140px;
      }
      .c-searchGroup__button {
        padding: 0.7rem 1.4rem;
        font-size: 1rem;
        margin-left: auto;
      }
      .c-hero__cta__secondary {
        padding: 0.7rem 1.8rem;
        font-size: 1rem;
      }
    }

    @media (max-width: 480px) {
      .c-hero__title {
        font-size: 2.2rem;
      }
      .c-hero__copy {
        font-size: 1rem;
        padding: 0.7rem 1rem;
      }
      .c-searchGroup {
        border-radius: 40px;
        padding-left: 0.8rem;
      }
      .c-searchGroup__input {
        font-size: 0.95rem;
        padding: 0.7rem 0.3rem;
      }
      .c-searchGroup__button {
        padding: 0.6rem 1.2rem;
        font-size: 0.9rem;
      }
      .c-hero__cta__secondary {
        padding: 0.6rem 1.4rem;
        font-size: 0.95rem;
      }
    }

    /* utility */
    .u-sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      border: 0;
    }
    .u-blockLargeOnly {
      display: none;
    }
    .u-svg-ico {
      display: none;
    }
  </style>
</head>
<body>
  <div class="o-container">
    <!-- toast (hidden) -->
    <p class="module_toast toast_top" style="display: none"></p>

    <div class="c-hero__main">
      <header class="c-hero__headings">
        <!-- H1: Click Aura (main) + span effect -->
        <h1 class="c-hero__title">
          Click <span>Aura</span>
        </h1>
        <!-- H2: hidden but keep for structure -->
        <h2 class="c-hero__subTitle"></h2>
        <!-- H3: personal brand message -->
        <h3 class="c-hero__copy">
          <strong>Your brand deserves an aura.</strong><br>
          I'm Fatima Altaf. I turn social media chaos into a growth engine that attracts, engages, and converts without the fluff.
        </h3>
      </header>

      <div class="c-hero__cta">
        <!-- search form: placeholder replaced, button text changed -->
        <form class="c-hero__cta__form" role="search" id="searchFreelancers" data-url="" runat="server">
          <label for="searchQuery" class="u-sr-only">What skill are you looking for?</label>
          <div class="c-searchGroup">
            <input type="text"
                   id="searchQuery"
                   name="searchQuery"
                   class="c-searchGroup__input"
                   autocomplete="off"
                   placeholder="Let's Build Your Aura"
                   value=""
                   onkeypress="datalayerpush(event)"
                   onfocus="runAutocomplete();this.onfocus=null"
            />
            <button type="submit" id="Search-Freelancers" class="c-searchGroup__button" title="Search Freelancers" onclick="datalayerpush(event)">
              <!-- old SVG removed, using plain text -->
              Let's Build Your Aura
            </button>
          </div>
        </form>

        <!-- new secondary button "see my work" -->
        <button class="c-hero__cta__secondary" onclick="console.log('see my work clicked')">
          ✦ See my work
        </button>
      </div>
    </div>
  </div>

  <!-- minimal dummy functions to avoid console errors (keep original behavior) -->
  <script>
    function datalayerpush(e) {
      // stub for original datalayerpush
      // console.log('datalayerpush triggered', e);
    }
    function runAutocomplete() {
      // stub for autocomplete
      // console.log('autocomplete triggered');
    }
    // attach a small click handler on the new button for demo (optional)
    document.addEventListener('DOMContentLoaded', function() {
      const seeWorkBtn = document.querySelector('.c-hero__cta__secondary');
      if (seeWorkBtn) {
        seeWorkBtn.addEventListener('click', function(e) {
          // you can add GA or custom logic here
          // console.log('See my work – portfolio preview');
        });
      }
    });
  </script>
</body>
</html>
