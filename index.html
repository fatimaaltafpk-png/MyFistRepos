<style>
    /* Section ka main layout - Text left pe, image right pe */
    .guru-exact-bg {
        width: 100%;
        min-height: 500px;
        position: relative;
        background: #2b3247;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: space-between; /* Text aur image ke beech space */
        padding: 60px 80px;
        gap: 20px;
    }

    /* Background dots aur gradients wahi hain */
    .guru-exact-bg::before {
        content: '';
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        width: 60%;
        background: linear-gradient(135deg, rgba(43, 50, 71, 0) 0%, rgba(43, 50, 71, 0.3) 30%, rgba(59, 130, 200, 0.25) 60%, rgba(70, 150, 220, 0.35) 100%);
        pointer-events: none;
    }

    .dot-1, .dot-2, .dot-3 { position: absolute; border-radius: 50%; pointer-events: none; }
    .dot-1 { right: -50px; top: -100px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(80, 160, 240, 0.12), transparent 70%); }
    .dot-2 { right: 10%; bottom: -100px; width: 350px; height: 350px; background: radial-gradient(circle, rgba(60, 140, 220, 0.10), transparent 70%); }
    .dot-3 { right: 30%; top: 15%; width: 150px; height: 150px; background: radial-gradient(circle, rgba(100, 180, 255, 0.08), transparent 70%); }

    /* Text content - Isko bilkul nahi chheda */
    .content {
        position: relative;
        z-index: 2;
        color: #ffffff;
        max-width: 600px;
    }

    .content h1 { font-size: 48px; font-weight: 700; margin: 0 0 10px 0; }
    .content h2 { font-size: 24px; font-weight: 400; margin: 0 0 20px 0; color: #a0c0ff; }
    .content p { font-size: 18px; line-height: 1.6; color: rgba(255, 255, 255, 0.85); margin-bottom: 30px; }

    /* Search bar style */
    .c-searchGroup { display: flex; gap: 10px; max-width: 500px; background: white; padding: 5px; border-radius: 4px; }
    .c-searchGroup__input { flex: 1; padding: 12px 15px; border: none; outline: none; font-size: 16px; }
    .c-searchGroup__button { padding: 10px 25px; background: #0073b1; color: white; border: none; cursor: pointer; font-weight: bold; }
    .c-secondary-btn { display: inline-block; margin-top: 15px; color: #ffffff; text-decoration: underline; }

    /* Image Wrapper - Image ko right side set karne ke liye */
    .hero-image-wrapper {
        position: relative;
        z-index: 2;
        width: 350px; /* Image ka size */
        margin-right: 50px;
    }
    .hero-image-wrapper img { width: 100%; height: auto; }

    /* Mobile Responsive */
    @media (max-width: 768px) {
        .guru-exact-bg { flex-direction: column; text-align: center; padding: 40px 20px; }
        .hero-image-wrapper { display: none; } /* Mobile pe image hide ho jayegi taake layout na bigde */
    }
</style>

<section class="guru-exact-bg">
    <div class="dot-1"></div>
    <div class="dot-2"></div>
    <div class="dot-3"></div>

    <!-- Text area waisa ka waisa -->
    <div class="content">
        <h1>Click Aura</h1>
        <h2>Your brand deserves an aura</h2>
        <p>I'm Fatima Altaf. I turn social media chaos into a growth engine that attracts, engages, and converts without the fluff.</p>

        <form class="c-hero__cta__form">
            <div class="c-searchGroup">
                <input type="text" class="c-searchGroup__input" placeholder="Lets Build Your Aura">
                <button type="submit" class="c-searchGroup__button">Search</button>
            </div>
            <a href="#" class="c-secondary-btn">See My Work</a>
        </form>
    </div>

    <!-- Image area right side par -->
    <div class="hero-image-wrapper">
        <img src="https://i.ibb.co/QjQLv8vg/Screenshot-2026-07-19-9-34-44-PM.png" alt="Fatima Altaf">
    </div>
</section>
