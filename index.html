
<style>
    /* Spacing and Layout CSS */
    .hero-section {
        padding: 80px 40px; /* Top/Bottom padding for the hero area */
        background-color: #2c3e50; /* Background color matching the image */
        color: #ffffff;
        display: flex;
        align-items: center;
    }

    .c-hero__main {
        max-width: 1200px;
        margin: 0 auto; /* Keeps content centered */
        width: 100%;
    }

    .c-hero__headings {
        margin-bottom: 30px; /* Spacing between text and search box */
    }

    .c-hero__title {
        font-size: 52px;
        line-height: 1.1;
        margin-bottom: 20px; /* Margin under the main title */
        font-weight: 700;
    }

    .c-hero__subTitle {
        margin: 0 0 20px 0;
        font-weight: 400;
        opacity: 0.9;
    }

    .c-hero__copy {
        font-size: 18px;
        margin-bottom: 40px; /* Spacing before the search input */
        line-height: 1.6;
        max-width: 600px;
    }

    /* Search Box Spacing */
    .c-searchGroup {
        display: flex;
        gap: 15px; /* Spacing between input and button */
        margin-bottom: 25px; /* Margin below the search/action bar */
        background: white;
        padding: 5px;
        border-radius: 4px;
        max-width: 800px;
    }

    .c-searchGroup__input {
        flex: 1;
        padding: 15px 20px; /* Internal padding of input field */
        border: none;
        font-size: 16px;
    }

    .c-searchGroup__button {
        padding: 10px 30px; /* Button sizing */
        cursor: pointer;
    }
</style>

<!-- Structure -->
<section class="hero-section">
    <div class="c-hero__main">
        <header class="c-hero__headings">
            <h1 class="c-hero__title">Your Brand  <br>Deserve An AURA</h1>
            <h2 class="c-hero__subTitle"></h2>
            <h3 class="c-hero__copy">I'm Fatima Altaf. I turn social media chaos into a growth engine that attracts,engages, and converts without the fluff.</h3>
        </header>

        <div class="c-hero__cta">
            <form class="c-hero__cta__form" role="search">
                <div class="c-searchGroup">
                    <input type="text" class="c-searchGroup__input" placeholder="Lets Bulid Your Aura">
                    <button type="submit" class="c-searchGroup__button">Show my work</button>
                </div>
            </form>
        </div>
    </div>
</section>

<style>

        content: '';
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        width: 55%;
        background: radial-gradient(ellipse at 70% 50%, 
                    rgba(70, 110, 160, 0.5) 0%, 
                    rgba(43, 50, 71, 0) 70%);

    .bg-only .c1 {

        height: 600px;
        right: -100px;
        top: -200px;
        position: absolute;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(80, 140, 210, 0.15), transparent);
    }
    .bg-only .c2 {
        width: 400px;
        height: 400px;
        right: 20%;
        bottom: -150px;
        position: absolute;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(60, 120, 200, 0.1), transparent);
    }
</style>
