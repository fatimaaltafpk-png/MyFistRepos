<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Click Aura — Guru Style</title>

    <!-- Font Awesome for icons (same as guru.com) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <style>
        /* ====== RESET & BASE ====== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            color: #1a1a2e;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        button {
            cursor: pointer;
            font-family: inherit;
        }

        /* ====== TOP BAR - GURU.COM SIGNATURE ====== */
        .guru-top-bar {
            background: #0a1a2b;
            color: rgba(255, 255, 255, 0.7);
            padding: 8px 60px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .guru-top-bar a {
            color: rgba(255, 255, 255, 0.7);
            transition: color 0.2s;
        }

        .guru-top-bar a:hover {
            color: #ffffff;
        }

        .guru-top-bar .left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .guru-top-bar .left i {
            margin-right: 6px;
            font-size: 12px;
        }

        .guru-top-bar .right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .guru-top-bar .right .divider {
            color: rgba(255, 255, 255, 0.15);
        }

        /* ====== HEADER - GURU.COM EXACT ====== */
        .guru-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 60px;
            background: #ffffff;
            border-bottom: 1px solid #eef0f2;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .guru-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .guru-logo .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #0066cc, #004d99);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 20px;
            font-weight: 800;
        }

        .guru-logo .logo-text {
            font-size: 24px;
            font-weight: 800;
            color: #0a1a2b;
            letter-spacing: -0.5px;
        }

        .guru-logo .logo-text span {
            color: #0066cc;
        }

        .guru-nav {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .guru-nav a {
            font-size: 14px;
            font-weight: 500;
            color: #4a5568;
            transition: color 0.2s;
            position: relative;
        }

        .guru-nav a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: #0066cc;
            transition: width 0.3s ease;
        }

        .guru-nav a:hover {
            color: #0066cc;
        }

        .guru-nav a:hover::after {
            width: 100%;
        }

        .guru-nav a i {
            font-size: 12px;
            margin-left: 4px;
            color: #9ca3af;
        }

        .guru-nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .guru-nav-right .search-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #f3f4f6;
            color: #4a5568;
            font-size: 16px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .guru-nav-right .search-btn:hover {
            background: #e5e7eb;
            color: #0066cc;
        }

        .btn-outline {
            padding: 10px 24px;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #1a1a2e;
            background: transparent;
            transition: all 0.2s;
        }

        .btn-outline:hover {
            border-color: #0066cc;
            color: #0066cc;
            background: #f0f7ff;
        }

        .btn-primary {
            padding: 10px 28px;
            background: #0066cc;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            background: #0052a3;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0, 102, 204, 0.35);
        }

        .btn-primary i {
            font-size: 14px;
        }

        /* ====== HERO - GURU.COM EXACT ====== */
        .guru-hero {
            padding: 80px 60px 100px;
            background: linear-gradient(165deg, #0a1a2b 0%, #162b3e 50%, #1a3347 100%);
            color: #ffffff;
            position: relative;
            overflow: hidden;
        }

        .guru-hero::before {
            content: '';
            position: absolute;
            top: -300px;
            right: -200px;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(0, 102, 204, 0.06) 0%, transparent 70%);
            border-radius: 50%;
        }

        .guru-hero::after {
            content: '';
            position: absolute;
            bottom: -200px;
            left: -100px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 102, 204, 0.04) 0%, transparent 70%);
            border-radius: 50%;
        }

        .guru-hero-content {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .guru-hero-left .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 16px 6px 8px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 24px;
        }

        .guru-hero-left .hero-badge .badge-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.8); }
        }

        .guru-hero-left h1 {
            font-size: 58px;
            font-weight: 900;
            line-height: 1.05;
            letter-spacing: -2.5px;
            margin-bottom: 20px;
        }

        .guru-hero-left h1 .highlight {
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .guru-hero-left p {
            font-size: 20px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.75);
            line-height: 1.7;
            margin-bottom: 36px;
            max-width: 520px;
        }

        .guru-hero-left p strong {
            color: #60a5fa;
            font-weight: 600;
        }

        .guru-hero-actions {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .guru-hero-actions .btn-primary-hero {
            padding: 14px 38px;
            background: #0066cc;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .guru-hero-actions .btn-primary-hero:hover {
            background: #0052a3;
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 102, 204, 0.4);
        }

        .guru-hero-actions .btn-outline-light {
            padding: 14px 38px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.06);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .guru-hero-actions .btn-outline-light:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.35);
            transform: translateY(-2px);
        }

        .guru-hero-actions .btn-outline-light i {
            font-size: 14px;
        }

        /* Hero Stats Card */
        .guru-hero-right {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .guru-hero-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 32px 28px;
            width: 100%;
            max-width: 420px;
        }

        .guru-hero-card .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .guru-hero-card .card-header span {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .guru-hero-card .card-header i {
            color: rgba(255, 255, 255, 0.2);
            font-size: 18px;
        }

        .guru-hero-card .stat-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .guru-hero-card .stat-item:last-child {
            border-bottom: none;
        }

        .guru-hero-card .stat-icon {
            width: 44px;
            height: 44px;
            background: rgba(0, 102, 204, 0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #60a5fa;
            flex-shrink: 0;
        }

        .guru-hero-card .stat-info h4 {
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
        }

        .guru-hero-card .stat-info p {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin: 0;
        }

        /* ====== TRUST BAR - GURU.COM SIGNATURE ====== */
        .guru-trust {
            padding: 40px 60px;
            background: #f8fafc;
            border-top: 1px solid #eef0f2;
            border-bottom: 1px solid #eef0f2;
        }

        .guru-trust-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .guru-trust-content span {
            font-size: 14px;
            font-weight: 500;
            color: #4a5568;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .guru-trust-content .trust-icons {
            display: flex;
            align-items: center;
            gap: 40px;
            color: #9ca3af;
            font-size: 28px;
        }

        .guru-trust-content .trust-icons i {
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .guru-trust-content .trust-icons i:hover {
            opacity: 1;
        }

        /* ====== FEATURES - GURU.COM EXACT ====== */
        .guru-features {
            padding: 100px 60px;
            background: #ffffff;
        }

        .guru-features-header {
            text-align: center;
            max-width: 700px;
            margin: 0 auto 60px;
        }

        .guru-features-header .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #e8f0fe;
            color: #0066cc;
            padding: 6px 18px 6px 14px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.3px;
            margin-bottom: 16px;
        }

        .guru-features-header .badge i {
            font-size: 12px;
        }

        .guru-features-header h2 {
            font-size: 44px;
            font-weight: 800;
            color: #0a1a2b;
            letter-spacing: -1.5px;
            margin-bottom: 16px;
        }

        .guru-features-header p {
            font-size: 18px;
            color: #4a5568;
            line-height: 1.7;
        }

        .guru-features-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        .guru-feature-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 40px 32px;
            border: 1px solid #eef0f2;
            transition: all 0.3s;
            position: relative;
        }

        .guru-feature-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.06);
            border-color: #d1d5db;
        }

        .guru-feature-card .card-icon {
            width: 56px;
            height: 56px;
            background: #f0f7ff;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #0066cc;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .guru-feature-card:hover .card-icon {
            background: #0066cc;
            color: #ffffff;
            transform: scale(1.05);
        }

        .guru-feature-card h3 {
            font-size: 20px;
            font-weight: 700;
            color: #0a1a2b;
            margin-bottom: 10px;
        }

        .guru-feature-card p {
            font-size: 15px;
            color: #4a5568;
            line-height: 1.7;
        }

        .guru-feature-card .feature-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 18px;
            color: #0066cc;
            font-weight: 600;
            font-size: 14px;
            transition: gap 0.3s;
        }

        .guru-feature-card .feature-link:hover {
            gap: 14px;
        }

        /* ====== CAROUSEL - GURU.COM EXACT ====== */
        .guru-carousel-section {
            padding: 80px 60px 100px;
            background: #f8fafc;
        }

        .guru-carousel-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        .guru-carousel-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .guru-carousel-header .left h2 {
            font-size: 34px;
            font-weight: 800;
            color: #0a1a2b;
            letter-spacing: -1px;
        }

        .guru-carousel-header .left p {
            color: #4a5568;
            font-size: 16px;
            margin-top: 4px;
        }

        .guru-carousel-header .right {
            display: flex;
            gap: 12px;
        }

        .guru-carousel-header .right button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1.5px solid #d1d5db;
            background: #ffffff;
            color: #1a1a2e;
            font-size: 18px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .guru-carousel-header .right button:hover {
            border-color: #0066cc;
            color: #0066cc;
            background: #f0f7ff;
        }

        .guru-carousel-track-container {
            overflow: hidden;
            border-radius: 20px;
        }

        .guru-carousel-track {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .guru-carousel-slide {
            min-width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            padding: 50px 60px;
            background: #ffffff;
            border-radius: 20px;
            align-items: center;
            border: 1px solid #eef0f2;
        }

        .guru-slide-content .slide-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #e8f0fe;
            color: #0066cc;
            padding: 4px 14px 4px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.3px;
            margin-bottom: 14px;
        }

        .guru-slide-content .slide-badge i {
            font-size: 10px;
        }

        .guru-slide-content h3 {
            font-size: 30px;
            font-weight: 800;
            color: #0a1a2b;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .guru-slide-content p {
            font-size: 17px;
            color: #4a5568;
            line-height: 1.7;
            margin-bottom: 24px;
        }

        .guru-slide-content .btn-secondary {
            padding: 12px 30px;
            background: #0066cc;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .guru-slide-content .btn-secondary:hover {
            background: #0052a3;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 102, 204, 0.3);
        }

        .guru-slide-content .btn-secondary i {
            font-size: 14px;
        }

        .guru-slide-image {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .guru-slide-image .img-placeholder {
            width: 100%;
            max-width: 400px;
            height: 260px;
            background: linear-gradient(145deg, #f0f4f8, #e4e8ec);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: #9ca3af;
            position: relative;
            overflow: hidden;
        }

        .guru-slide-image .img-placeholder::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(145deg, rgba(0, 102, 204, 0.02), transparent);
        }

        /* Carousel Dots */
        .guru-carousel-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 32px;
        }

        .guru-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #d1d5db;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            padding: 0;
        }

        .guru-dot.active {
            background: #0066cc;
            width: 32px;
            border-radius: 4px;
        }

        .guru-dot:hover {
            background: #0066cc;
            opacity: 0.6;
        }

        /* ====== CTA BANNER - GURU.COM STYLE ====== */
        .guru-cta {
            padding: 80px 60px;
            background: linear-gradient(165deg, #0a1a2b 0%, #162b3e 100%);
            color: #ffffff;
            text-align: center;
        }

        .guru-cta-content {
            max-width: 700px;
            margin: 0 auto;
        }

        .guru-cta-content h2 {
            font-size: 40px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 16px;
        }

        .guru-cta-content p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 32px;
        }

        .guru-cta-content .cta-buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .guru-cta-content .btn-cta-primary {
            padding: 14px 40px;
            background: #0066cc;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .guru-cta-content .btn-cta-primary:hover {
            background: #0052a3;
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 102, 204, 0.4);
        }

        .guru-cta-content .btn-cta-secondary {
            padding: 14px 40px;
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .guru-cta-content .btn-cta-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        /* ====== FOOTER - GURU.COM EXACT ====== */
        .guru-footer {
            background: #0a1a2b;
            color: rgba(255, 255, 255, 0.6);
            padding: 60px 60px 30px;
        }

        .guru-footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 50px;
        }

        .guru-footer .brand h4 {
            font-size: 22px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 12px;
        }

        .guru-footer .brand h4 span {
            color: #0066cc;
        }

        .guru-footer .brand p {
            font-size: 14px;
            line-height: 1.7;
            max-width: 300px;
        }

        .guru-footer .brand .social {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .guru-footer .brand .social a {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
